<svg xmlns="http://www.w3.org/2000/svg" width="1100" height="620" viewBox="0 0 1100 620" role="img" aria-labelledby="title desc">
  <title id="title">Timeline comparison before and after using Subagent Router</title>
  <desc id="desc">Before Subagent Router, the main session accumulates search, implementation, test logs, and final synthesis in one context. After Subagent Router, the main session keeps only brief, dispatch, and synthesis while large source and process context stays in a subagent.</desc>
  <style>
    .bg { fill: #f8fafc; }
    .panel { fill: #ffffff; stroke: #d9e1ec; stroke-width: 1.2; }
    .axis { stroke: #aab6c5; stroke-width: 1; }
    .grid { stroke: #dfe6ef; stroke-width: 1; stroke-dasharray: 3 6; }
    .label { fill: #1f2937; font: 600 16px -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; }
    .small { fill: #526174; font: 500 12px -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; }
    .tiny { fill: #6b7788; font: 500 11px -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; }
    .badgeText { fill: #293241; font: 700 18px -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; }
    .badgeSmall { fill: #526174; font: 600 12px -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; }
    .segmentText { fill: #ffffff; font: 700 12px -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; }
    .darkText { fill: #293241; font: 700 12px -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; }
    .mainBefore { fill: #b85b5b; }
    .mainBeforeAlt { fill: #d07a60; }
    .mainAfter { fill: #2f6f9f; }
    .subagent { fill: #3e8d6e; }
    .saved { fill: #f7d56e; opacity: 0.32; }
    .savedStroke { fill: none; stroke: #d7a720; stroke-width: 1.5; stroke-dasharray: 5 5; }
    .arrow { fill: none; stroke: #8c99aa; stroke-width: 1.8; marker-end: url(#arrowhead); }
  </style>

  <defs>
    <marker id="arrowhead" markerWidth="9" markerHeight="7" refX="8" refY="3.5" orient="auto">
      <polygon points="0 0, 9 3.5, 0 7" fill="#8c99aa" />
    </marker>
    <filter id="shadow" x="-5%" y="-10%" width="110%" height="130%">
      <feDropShadow dx="0" dy="8" stdDeviation="10" flood-color="#1f2937" flood-opacity="0.10" />
    </filter>
  </defs>

  <rect class="bg" width="1100" height="620" rx="24" />
  <rect class="panel" x="40" y="34" width="1020" height="552" rx="20" filter="url(#shadow)" />

  <text class="label" x="78" y="76">Timeline view: where the context goes</text>
  <text class="small" x="78" y="102">Same task, different context shape.</text>
  <text class="small" x="78" y="121">Subagents carry source and process detail; the main session keeps decisions.</text>

  <rect x="808" y="58" width="204" height="64" rx="16" fill="#eef6ff" stroke="#b9d7f2" />
  <text class="badgeText" x="830" y="88">94%-96% less</text>
  <text class="badgeSmall" x="830" y="108">main-session context on large flows</text>

  <line class="grid" x1="120" y1="166" x2="120" y2="512" />
  <line class="grid" x1="333" y1="166" x2="333" y2="512" />
  <line class="grid" x1="545" y1="166" x2="545" y2="512" />
  <line class="grid" x1="758" y1="166" x2="758" y2="512" />
  <line class="grid" x1="970" y1="166" x2="970" y2="512" />

  <line class="axis" x1="120" y1="512" x2="970" y2="512" />
  <text class="tiny" x="112" y="535">start</text>
  <text class="tiny" x="512" y="535">task progress</text>
  <text class="tiny" x="955" y="535">finish</text>

  <text class="label" x="120" y="153">Before: serial inline work</text>
  <rect class="mainBefore" x="120" y="176" width="102" height="46" rx="10" />
  <rect class="mainBeforeAlt" x="222" y="176" width="297" height="46" rx="10" />
  <rect class="mainBefore" x="519" y="176" width="178" height="46" rx="10" />
  <rect class="mainBeforeAlt" x="697" y="176" width="170" height="46" rx="10" />
  <rect class="mainBefore" x="867" y="176" width="103" height="46" rx="10" />
  <text class="segmentText" x="142" y="204">brief</text>
  <text class="segmentText" x="304" y="204">search + read</text>
  <text class="segmentText" x="563" y="204">implement</text>
  <text class="segmentText" x="744" y="204">test logs</text>
  <text class="segmentText" x="889" y="204">final</text>
  <text class="small" x="120" y="250">Main session absorbs every intermediate source, command output, and reasoning step.</text>

  <path class="arrow" d="M 908 232 C 930 251, 945 269, 956 295" />
  <rect x="788" y="283" width="184" height="44" rx="12" fill="#fff2e8" stroke="#e2a779" />
  <text class="darkText" x="808" y="310">context pressure grows</text>

  <text class="label" x="120" y="334">After: subagent-router</text>
  <rect class="mainAfter" x="120" y="360" width="102" height="46" rx="10" />
  <rect class="mainAfter" x="222" y="360" width="51" height="46" rx="10" />
  <rect class="saved" x="273" y="344" width="594" height="78" rx="14" />
  <rect class="savedStroke" x="273" y="344" width="594" height="78" rx="14" />
  <rect class="mainAfter" x="867" y="360" width="103" height="46" rx="10" />
  <rect class="subagent" x="273" y="430" width="594" height="38" rx="10" />
  <text class="segmentText" x="142" y="388">brief</text>
  <text class="segmentText" x="230" y="388">route</text>
  <text class="segmentText" x="889" y="388">final</text>
  <text class="darkText" x="412" y="388">large source/process context stays out</text>
  <text class="segmentText" x="510" y="455">subagent owns search, implementation, tests, or review</text>
  <text class="small" x="120" y="496">Main session keeps the brief, dispatch choice, returned facts, changed paths, verification, and risks.</text>

  <g>
    <circle cx="318" cy="556" r="6" fill="#2f6f9f" />
    <text class="tiny" x="332" y="560">controller context</text>
    <circle cx="464" cy="556" r="6" fill="#3e8d6e" />
    <text class="tiny" x="478" y="560">subagent work</text>
    <circle cx="594" cy="556" r="6" fill="#f1c84e" opacity="0.8" />
    <text class="tiny" x="608" y="560">context avoided in main session</text>
  </g>
</svg>
